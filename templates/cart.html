<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: #f2f2f2;
        }

        button{
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .total{
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .shopping-btn{
            margin-top: 20px;
        }

    </style>

</head>
<body>

<div class="container mt-4">
 <h1 class="text-center text-success mb-4">
    Your Shopping Cart
</h1> 

{% if cart_items %}

<table class="table table-bordered table-striped table-hover">

    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
        <th>Action</th>
    </tr>

    {% for item in cart_items %}

    <tr>

        <td>{{ item.product_name }}</td>

        <td>₹{{ item.price }}</td>

        <td>

            <a href="/decrease_quantity/{{ item.cart_id }}">
                <button type="button" class="btn btn-warning">
                  -
                </button>
            </a>

            <strong>{{ item.quantity }}</strong>

            <a href="/increase_quantity/{{ item.cart_id }}">
                <button type="button" class="btn btn-success">
                 +
                </button>
            </a>

        </td>

        <td>
            ₹{{ item.price * item.quantity }}
        </td>

        <td>

            <a href="/remove_cart/{{ item.cart_id }}">
                <button type="button" class="btn btn-danger">
                 Remove
                </button>
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

<div class="total">
    <div class="alert alert-success mt-3">

    <h4>
        Total Amount : ₹{{ total }}
    </h4>

    </div>
</div>
<br><br>

<a href="/checkout">
    <button type="button" class="btn btn-primary">
    Checkout
    </button>
</a>

<div class="shopping-btn">

    <a href="/">
        <button type="button">
            Continue Shopping
        </button>
    </a>

</div>

{% else %}

<h2>Your Cart is Empty</h2>

<a href="/">
    <button type="button">
        Shop Now
    </button>
</a>

{% endif %}
</div>
</body>
</html>
