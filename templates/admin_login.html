<!DOCTYPE html>
<html lqng="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1f4037, #99f2c8);
    }

    .login-container {
        background: #fff;
        padding: 40px;
        width: 320px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
    }

    .login-container h2 {
        margin-bottom: 25px;
        color: #333;
    }

    .login-container input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
    }

    .login-container input:focus {
        border-color: #1f4037;
        box-shadow: 0 0 6px rgba(31,64,55,0.4);
    }

    .login-container button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #1f4037;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
    }

    .login-container button:hover {
        background: #145a32;
        transform: translateY(-2px);
    }

    .login-container .note {
        margin-top: 12px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>
<body>
<div class="login-container">
<h1>Admin Login</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>
<div class="note">
        Secure admin access only
</div>
</div>
</body>
</html>
