<!DOCTYPE html>
<html>
<head>

    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Edit Product</h2>

    <form method="POST">

        <input
            type="text"
            name="product_name"
            value="{{ product.product_name }}"
            class="form-control mb-2"
            required>

        <input
            type="text"
            name="category"
            value="{{ product.category }}"
            class="form-control mb-2"
            required>

        <input
            type="number"
            name="price"
            value="{{ product.price }}"
            class="form-control mb-2"
            required>

        <input
            type="number"
            name="stock"
            value="{{ product.stock }}"
            class="form-control mb-2"
            required>

        <textarea
            name="description"
            class="form-control mb-2"
            required>{{ product.description }}</textarea>

        <button
            type="submit"
            class="btn btn-success">

            Update Product

        </button>

    </form>

</div>

</body>
</html>
